# ─────────────────────────────────────────────────────────────────────────────
# AgroVault — nginx reverse proxy configuration
# Serves React SPA on / and proxies /api/* → FastAPI on backend:8000
# ─────────────────────────────────────────────────────────────────────────────

# Upstream FastAPI backend
upstream agrovault_backend {
    server backend:8000;
    keepalive 32;
}

# ── Gzip compression ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml
    font/woff2;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── API proxy → FastAPI backend ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://agrovault_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static asset caching (JS/CSS/fonts built by Vite) ────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA — all other routes fall back to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check endpoint passthrough ─────────────────────────────────────
    location = /health {
        proxy_pass http://agrovault_backend/api/health;
        access_log off;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
